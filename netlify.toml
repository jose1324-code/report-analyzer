[build]
  base    = "langing-_module-main/langing-_module-main"
  command = "pnpm run build:client"
  publish = "langing-_module-main/langing-_module-main/dist/spa"

[build.environment]
  NODE_VERSION = "18"
  PNPM_VERSION = "10.14.0"

[functions]
  directory          = "langing-_module-main/langing-_module-main/netlify/functions"
  external_node_modules = ["express"]
  node_bundler       = "esbuild"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
